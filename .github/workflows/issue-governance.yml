name: issue-governance

on:
  issues:
    types: [opened, edited, labeled, unlabeled, reopened]

permissions:
  contents: read
  issues: write

jobs:
  enforce:
    runs-on: ubuntu-latest
    steps:
      - name: Validate issue title and labels
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const number = issue.number;

            const titleOk = /^(epic|research|task|bug|skill-change):\s+.+/i.test(issue.title || '');
            const labels = (issue.labels || []).map(l => l.name);
            const typeLabels = labels.filter(l => l.startsWith('type:'));
            const priorityLabels = labels.filter(l => l.startsWith('priority:'));
            const areaLabels = labels.filter(l => l.startsWith('area:'));

            const errors = [];
            if (!titleOk) errors.push('Title must match `epic|research|task|bug|skill-change: <summary>`.');
            if (typeLabels.length !== 1) errors.push('Exactly one `type:*` label is required.');
            if (priorityLabels.length !== 1) errors.push('Exactly one `priority:*` label is required.');
            if (areaLabels.length < 1) errors.push('At least one `area:*` label is required.');

            const marker = '<!-- issue-governance-bot -->';
            const body = errors.length === 0
              ? `${marker}\n✅ Ticket governance checks passed.`
              : `${marker}\n⚠️ Ticket governance checks failed:\n- ${errors.join('\n- ')}`;

            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number: number, per_page: 100 });
            const prev = comments.find(c => (c.body || '').includes(marker));

            if (prev) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: prev.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: number, body });
            }

            if (errors.length) core.setFailed(`Issue governance validation failed for #${number}`);
