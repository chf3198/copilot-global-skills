name: ticket-governance-metrics

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: read

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Compute ticket governance metrics
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              per_page: 100
            });

            const realIssues = issues.filter(i => !i.pull_request);
            const total = realIssues.length || 1;

            let titleOk = 0;
            let labelsOk = 0;
            let typeOk = 0;
            let priorityOk = 0;
            let areaOk = 0;

            for (const i of realIssues) {
              const labels = (i.labels || []).map(l => typeof l === 'string' ? l : l.name);
              const t = labels.filter(l => l.startsWith('type:')).length;
              const p = labels.filter(l => l.startsWith('priority:')).length;
              const a = labels.filter(l => l.startsWith('area:')).length;
              const titleGood = /^(epic|research|task|bug|skill-change):\s+.+/i.test(i.title || '');

              if (titleGood) titleOk++;
              if (t === 1) typeOk++;
              if (p === 1) priorityOk++;
              if (a >= 1) areaOk++;
              if (t === 1 && p === 1 && a >= 1) labelsOk++;
            }

            const pct = (n) => `${Math.round((n / total) * 100)}%`;
            const lines = [
              `# Ticket Governance Metrics`,
              ``,
              `Open issues analyzed: **${realIssues.length}**`,
              ``,
              `- Title compliance: **${pct(titleOk)}**`,
              `- Label taxonomy compliance: **${pct(labelsOk)}**`,
              `- Type label compliance: **${pct(typeOk)}**`,
              `- Priority label compliance: **${pct(priorityOk)}**`,
              `- Area label compliance: **${pct(areaOk)}**`,
              ``,
              `_Generated by ticket-governance-metrics workflow._`
            ];

            core.summary.addRaw(lines.join('\n')).write();
