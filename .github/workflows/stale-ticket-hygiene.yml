name: stale-ticket-hygiene

on:
  schedule:
    - cron: '30 2 * * 1'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: 'This issue is stale due to inactivity. Comment with an update to keep it active.'
          close-issue-message: 'Closing as stale due to prolonged inactivity. Re-open with fresh context if still needed.'
          stale-issue-label: 'stale'
          days-before-issue-stale: 45
          days-before-issue-close: 14
          exempt-issue-labels: 'type: epic,priority: p1,security,keep-open'
          exempt-all-issue-assignees: true
          exempt-all-issue-milestones: true
          remove-issue-stale-when-updated: true
          only-issue-types: 'bug,task,feature'
          close-issue-reason: not_planned
          days-before-pr-stale: -1
          days-before-pr-close: -1
