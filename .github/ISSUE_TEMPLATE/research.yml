name: Research
description: Gather evidence before changing policy/skill behavior.
title: "research: "
labels: ["type: research"]
type: task
body:
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - priority: p1
        - priority: p2
        - priority: p3
    validations:
      required: true
  - type: checkboxes
    id: area
    attributes:
      label: Area labels to apply
      options:
        - label: area: governance
        - label: area: security
        - label: area: collaboration
        - label: area: release
        - label: area: standards
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: Research question
    validations:
      required: true
  - type: textarea
    id: sources
    attributes:
      label: Required sources
    validations:
      required: false
  - type: textarea
    id: output
    attributes:
      label: Expected output
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification method
    validations:
      required: true
